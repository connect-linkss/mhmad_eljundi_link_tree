<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamad Yahya Eljundi | Link Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --bg-1: #07142a;
            --bg-2: #101f3c;
            --gold: #d8b56b;
            --gold-strong: #f0d995;
            --text-main: #f6f7fb;
            --text-soft: #d6d7df;
            --glass: rgba(255, 255, 255, 0.07);
            --ring: rgba(216, 181, 107, 0.35);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            font-family: 'Cairo', sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 10% 20%, rgba(216, 181, 107, 0.15), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(216, 181, 107, 0.12), transparent 42%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.4;
            background:
                radial-gradient(circle at 20% 25%, rgba(240, 217, 149, 0.28), transparent 32%),
                radial-gradient(circle at 78% 70%, rgba(111, 163, 255, 0.2), transparent 30%);
            animation: auroraMove 16s ease-in-out infinite alternate;
        }

        .container {
            width: min(600px, 100%);
            background: linear-gradient(165deg, rgba(14, 27, 52, 0.88), rgba(8, 17, 34, 0.92));
            border: 1px solid rgba(216, 181, 107, 0.35);
            border-radius: 24px;
            text-align: center;
            padding: 28px 24px 26px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
            animation: fadeIn .8s ease-out, cardFloat 6s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes auroraMove {
            0% { transform: translate3d(-3%, -2%, 0) scale(1); }
            50% { transform: translate3d(2%, 3%, 0) scale(1.06); }
            100% { transform: translate3d(4%, -1%, 0) scale(1.02); }
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .avatar-wrap {
            width: clamp(140px, 30vw, 176px);
            aspect-ratio: 1 / 1;
            margin: 0 auto 18px;
            border-radius: 16px;
            padding: 6px;
            background: linear-gradient(135deg, var(--gold-strong), #8f6b2f);
            box-shadow: 0 0 0 6px var(--ring), 0 14px 28px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .company-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 10px;
        }

        h1 {
            margin: 8px 0 4px;
            font-size: clamp(24px, 5vw, 36px);
            font-weight: 900;
            color: var(--gold-strong);
        }

        .description-section p {
            margin: 12px auto 22px;
            color: var(--text-soft);
            line-height: 1.6;
            font-size: 15px;
        }

        .social-links {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 15px;
            margin-top: 20px;
            justify-items: center;
        }

        .social-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all .3s ease;
            text-decoration: none;
            overflow: hidden; /* Ensures image stays in circle */
        }

        .social-btn:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .social-btn i { font-size: 28px; }
        .social-btn img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* Platform Colors */
        .website i { color: #61dafb; }
        .whatsapp i { color: #5ce087; }
        .facebook i { color: #6ca8ff; }
        .instagram i { color: #ff66a5; }
        .linkedin i { color: #0077b5; }
        .cv i { color: #ffd17e; }

        .qr-section { margin-top: 25px; }
        .qr-card {
            background: white;
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
        }
        .qr-card img { width: 130px; height: 130px; display: block; }

        footer { margin-top: 20px; font-size: 12px; opacity: 0.7; }
        footer a { color: var(--gold-strong); text-decoration: none; }

        @media (min-width: 480px) {
            .social-links { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="avatar-wrap">
                <img src="profile-logo.png" alt="Profile" class="company-logo" id="companyLogo">
            </div>
            <h1 id="companyName">Mohamad Yahya Eljundi</h1>
        </header>

        <main class="description-section">
            <h2 id="mainHeading" style="font-size: 18px; color: #fff;">Mayor of Khreibet El Jendi Municipality</h2>
            <p id="companyDescription">CEO of TANMIYA Wa Tashseen Association</p>
        </main>

        <section class="social-links" id="socialLinksContainer"></section>

        <section class="qr-section">
            <div class="qr-card">
                <img id="qrImage" alt="QR Code">
            </div>
            <p style="font-size: 12px; margin-top: 10px;">Scan to connect</p>
        </section>
    </div>

    <footer>
        <a href="https://connect-globale.com" target="_blank">Powered by Connect Media</a>
    </footer>

    <script>
        const companyData = {
            name: "Mohamad Yahya Eljundi",
            mainHeading: "Mayor of Khreibet El Jendi Municipality",
            description: "CEO of TANMIYA Wa Tashseen Association",
            qrValue: "https://khreibeteljundi.gov.lb/",
            socialMedia: [
                {
                    platform: "Website",
                    url: "https://links.khreibeteljundi.gov.lb/",
                    imageSrc: "companyLogo.png", // The image you want to show
                    cssClass: "website",
                    image: true // Trigger to show image instead of icon
                },
                {
                    platform: "WhatsApp",
                    url: "https://wa.me/96171666363",
                    iconClass: "fab fa-whatsapp",
                    cssClass: "whatsapp"
                },
                {
                    platform: "Facebook",
                    url: "https://www.facebook.com/mohammad.aljinde/",
                    iconClass: "fab fa-facebook-f",
                    cssClass: "facebook"
                },
                {
                    platform: "Instagram",
                    url: "https://www.instagram.com/mohamad_yahya_eljundi?igsh=MWRtY3VuMHdvdGphcg==",
                    iconClass: "fab fa-instagram",
                    cssClass: "instagram"
                },
                {
                    platform: "LinkedIn",
                    url: "https://www.linkedin.com/in/mohamad-yahya-eljundi-b1561a256/",
                    iconClass: "fab fa-linkedin-in",
                    cssClass: "linkedin"
                },
                {
                    platform: "CV",
                    url: "mohamad_yahya_eljundi_cv.pdf",
                    iconClass: "fas fa-file-pdf",
                    cssClass: "cv",
                    download: true
                }
            ]
        };

        document.addEventListener('DOMContentLoaded', () => {
            const data = companyData;

            // Generate QR
            document.getElementById('qrImage').src = 
                `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(data.qrValue)}`;

            const socialContainer = document.getElementById('socialLinksContainer');
            
            data.socialMedia.forEach(item => {
                const link = document.createElement('a');
                link.href = item.url;
                link.className = `social-btn ${item.cssClass}`;
                link.title = item.platform;

                if (item.url.startsWith("http")) {
                    link.target = "_blank";
                    link.rel = "noopener noreferrer";
                }

                if (item.download) {
                    link.setAttribute('download', '');
                }

                // LOGIC: Show image if "image: true", otherwise show icon
                if (item.image && item.imageSrc) {
                    const img = document.createElement('img');
                    img.src = item.imageSrc;
                    img.alt = item.platform;
                    link.appendChild(img);
                } else {
                    const icon = document.createElement('i');
                    icon.className = item.iconClass;
                    link.appendChild(icon);
                }

                socialContainer.appendChild(link);
            });
        });
    </script>
</body>
</html>
